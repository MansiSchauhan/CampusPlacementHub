<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Co-ordinator Login - Placement Cell</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container { max-width: 450px; width: 100%; padding: 20px; }
        .login-card {
            background: white; border-radius: 15px;
            padding: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header i { font-size: 50px; color: #1e3c72; margin-bottom: 15px; }
        .login-header h3 { color: #1e3c72; font-weight: 600; }
        .form-control {
            border-radius: 10px; padding: 12px 15px;
            border: 2px solid #e0e0e0; transition: all 0.3s;
        }
        .form-control:focus { border-color: #1e3c72; box-shadow: none; }
        .btn-login {
            background: #1e3c72; color: white; border: none;
            border-radius: 10px; padding: 12px; font-weight: 600;
            width: 100%; transition: all 0.3s;
        }
        .btn-login:hover { background: #2a5298; transform: translateY(-2px); }
        .form-label { font-weight: 500; color: #333; margin-bottom: 8px; }
        .register-link { text-align: center; margin-top: 20px; }
        .register-link a { color: #1e3c72; font-weight: 600; text-decoration: none; }
        .register-link a:hover { text-decoration: underline; }
        .back-home {
            position: absolute; top: 20px; left: 20px;
            color: white; text-decoration: none; font-weight: 500;
        }
        .back-home:hover { color: #ddd; }
        .divider { display: flex; align-items: center; margin: 20px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #e0e0e0; }
        .divider span { padding: 0 10px; color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <a href="/" class="back-home">
        <i class="fas fa-arrow-left me-2"></i>Back to Home
    </a>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-user-tie"></i>
                <h3>Co-ordinator Login</h3>
                <p class="text-muted">Access your placement dashboard</p>
            </div>

            {% if error %}
                <div class="alert alert-danger text-center">{{ error }}</div>
            {% endif %}

            <form action="{% url 'co_ordinatorapp:coordinator_login' %}" method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="text" name="coordinator_id" class="form-control"
                           placeholder="Enter your email" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control"
                           placeholder="Enter your password" required>
                </div>

                <div class="mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">Remember me</label>
                    </div>
                </div>

                <button type="submit" class="btn btn-login">
                    <i class="fas fa-sign-in-alt me-2"></i>Login
                </button>
            </form>

            <div class="divider"><span>OR</span></div>

            <div class="register-link">
                <p class="mb-2">Don't have an account?</p>
                <a href="{% url 'co_ordinatorapp:coordinator_signup' %}">Register Here</a>
            </div>

            <div class="register-link mt-3">
                <a href="{% url 'home:forgot_password' %}">Forgot Password?</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
