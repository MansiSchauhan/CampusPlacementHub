<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - {{ student.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Placement Portal</a>
            <div class="navbar-nav ms-auto">
                <span class="nav-link">Welcome, {{ student.name }} ({{ student.roll }})</span>
                <a class="nav-link" href="{% url 'home:student_login' %}?logout=1">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8">
                <h2>Student Dashboard</h2>
                <div class="card">
                    <div class="card-body">
                        <h5>Profile</h5>
                        <p><strong>Roll:</strong> {{ student.roll }}</p>
                        <p><strong>Name:</strong> {{ student.name }}</p>
                        <p><strong>Email:</strong> {{ student.email }}</p>
                        <p><strong>Department:</strong> {{ student.department }}</p>
                        <p><strong>Course:</strong> {{ student.course }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
