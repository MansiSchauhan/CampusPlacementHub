<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

    <title>Add Student</title>
  </head>
  <body>
    {% include 'std/navbar.html'%}
    <h1 class="text-center my-4">Update students</h1>
    <div class="container">
      <div class="row">
        <div class="col-md-6 offset-md-3">
              <div class="card bg-info">
                <div class="card-body">
                  <form action="/std/do-update-std/{{std.id}}" method="POST">
                    {% csrf_token %}
                    <div class="md-3">
                      <label for="roll">Roll</label>
                    <input name="std_roll"type="text" class="form-control" id="roll"  placeholder="Enter your roll" required value="{{std.roll}}">
                    </div>
                    <div class="md-3">
                      <label for="name">Name</label>
                      <input name="std_name" type="text" id="name" class="form-control" placeholder="Enter your name" required value="{{std.name}}">
                    </div>
                    <div class="md-3">
                      <label for="email">Email</label>
                      <input name="std_email" type="text" id="email" class="form-control"placeholder="Enter your email" required value="{{std.email}}">
                    </div>
                      <div class="md-3">
                      <label for="phone">Phone no:</label>
                      <input name="std_phone" type="number" id="phone" class="form-control"placeholder="Enter your Phone number" value="{{std.phone}}">
                    </div>
                      <div class="md-3">
                      <label for="address">Address</label>
                      <textarea name="std_address" id="address" rows="5" placeholder="Enter yoy address" class="form-control">{{std.address}}</textarea>
                    </div>
                    <div class="md-3">
                      <label for="department">Department</label>
                      <select name="std_department" id="department" class="form-control" required>
                        <option value="">Select Department</option>
                        <option value="CSE" {% if std.department == "CSE" %}selected{% endif %}>CSE</option>
                        <option value="ECE" {% if std.department == "ECE" %}selected{% endif %}>ECE</option>
                        <option value="MECH" {% if std.department == "MECH" %}selected{% endif %}>MECH</option>
                        <option value="Civil" {% if std.department == "Civil" %}selected{% endif %}>Civil</option>
                        <option value="Other" {% if std.department == "Other" %}selected{% endif %}>Other</option>
                      </select>
                    </div>
                    <div class="md-3">
                      <label for="course">Course</label>
                      <select name="std_course" id="course" class="form-control" required>
                        <option value="">Select Course</option>
                        <option value="B.Tech" {% if std.course == "B.Tech" %}selected{% endif %}>B.Tech</option>
                        <option value="M.Tech" {% if std.course == "M.Tech" %}selected{% endif %}>M.Tech</option>
                        <option value="BCA" {% if std.course == "BCA" %}selected{% endif %}>BCA</option>
                        <option value="MCA" {% if std.course == "MCA" %}selected{% endif %}>MCA</option>
                        <option value="Other" {% if std.course == "Other" %}selected{% endif %}>Other</option>
                      </select>
                    </div>
                    <div class="md-3">
                      <label for="password">Password</label>
                      <input type="password" name="std_password" id="password" class="form-control" placeholder="Enter password" value="{{std.password}}" required>
                    </div>
                    <div class="container text-center my-3" >
                      <button class="btn btn-primary">Update</button>
                    </div>
                  </form>   
                </div>
              </div>
        </div>
      </div>
    </div>

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
  </body>
</html>
