<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Department</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: rgba(15, 23, 42, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .modal-box {
            background: white;
            width: 100%;
            max-width: 520px;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .modal-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #111827;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-title i {
            color: #7c3aed;
        }

        .form-label {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-control {
            height: 48px;
            border-radius: 10px;
            margin-bottom: 18px;
        }

        .btn-update {
            background: linear-gradient(135deg,#7c3aed,#6d28d9);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            font-weight: 600;
        }

        .btn-update:hover {
            background: linear-gradient(135deg,#6d28d9,#5b21b6);
        }

        .btn-cancel {
            margin-top: 10px;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="modal-box">
    <div class="modal-title">
        <i class="fas fa-pen"></i> Update Department
    </div>

    <form method="post">
        {% csrf_token %}

        <label class="form-label">Department Name</label>
        <input type="text" name="dept_name" class="form-control"
               value="{{ dept.name }}" required>



        <button type="submit" class="btn-update">
            <i class="fas fa-save me-2"></i> Update Department
        </button>

        <a href="{% url 'departments' %}" class="btn btn-secondary btn-cancel">
            Cancel
        </a>
    </form>
</div>

</body>
</html>
